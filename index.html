<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>心情投球 🎱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; padding: 15px; color: #333;
    }
    .container { max-width: 100%; margin: 0 auto; }
    header { text-align: center; color: white; margin-bottom: 20px; }
    header h1 { font-size: 1.8rem; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
    header p { font-size: 0.9rem; opacity: 0.9; }
    .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .card h2 { margin-bottom: 15px; color: #667eea; font-size: 1.2rem; }
    .mood-selection { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
    .mood-ball { aspect-ratio: 1; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); font-weight: bold; }
    .mood-ball:active { transform: scale(0.95); }
    .mood-ball.selected { border-color: #333; transform: scale(1.1); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
    .mood-ball.red { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
    .mood-ball.yellow { background: linear-gradient(135deg, #ffd93d, #f9c846); color: #333; text-shadow: none; }
    .mood-ball.blue { background: linear-gradient(135deg, #6b9eff, #5a8bee); }
    .mood-ball.green { background: linear-gradient(135deg, #6bce6b, #5abf5a); }
    .mood-ball.purple { background: linear-gradient(135deg, #a78bfa, #9377f0); }
    .mood-ball.orange { background: linear-gradient(135deg, #ff9f43, #ff8e2e); }
    .moon-phase { text-align: center; padding: 15px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 12px; color: white; margin-bottom: 15px; }
    .moon-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .moon-name { font-size: 1rem; font-weight: bold; margin-bottom: 3px; }
    .moon-date { opacity: 0.8; font-size: 0.75rem; }
    .submit-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
    .submit-btn:active { transform: translateY(0); box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3); }
    .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
    .stat-item { text-align: center; padding: 10px 5px; background: #f8f9fa; border-radius: 8px; }
    .stat-count { font-size: 1.3rem; font-weight: bold; color: #667eea; }
    .stat-label { font-size: 0.65rem; color: #666; margin-top: 3px; }
    .calendar-container { padding: 5px; width: 100%; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .calendar-header h3 { font-size: 0.95rem; color: #667eea; }
    .calendar-nav { display: flex; gap: 5px; }
    .calendar-nav button { background: #f0f0f0; border: none; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #f8f9fa; border-radius: 8px; overflow: hidden; }
    .calendar-weekday { text-align: center; font-size: 0.65rem; color: #999; padding: 6px 0; font-weight: bold; background: #fff; }
    .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.65rem; position: relative; background: #fff; min-height: 45px; }
    .calendar-day.empty { background: #f8f9fa; }
    .calendar-day.today { border: 2px solid #667eea; }
    .calendar-day .day-num { font-weight: bold; margin-bottom: 2px; font-size: 0.65rem; }
    .calendar-day .moon-mini { font-size: 0.65rem; line-height: 1; }
    .calendar-day .mood-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 2px; }
    .history-list { max-height: 250px; overflow-y: auto; margin-top: 15px; }
    .history-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; gap: 12px; }
    .history-ball { width: 35px; height: 35px; border-radius: 50%; flex-shrink: 0; }
    .history-info { flex: 1; min-width: 0; }
    .history-date { font-weight: bold; margin-bottom: 2px; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-moon { font-size: 0.75rem; color: #666; }
    .message { padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; font-size: 0.85rem; }
    .message.success { background: #d4edda; color: #155724; }
    .message.error { background: #f8d7da; color: #721c24; }
    .message.info { background: #d1ecf1; color: #0c5460; }
    .tabs { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; }
    .tab-btn { flex: 1; min-width: 70px; padding: 8px 5px; background: #f0f0f0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; font-size: 0.75rem; }
    .tab-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .correlation-chart { margin-top: 15px; }
    .correlation-item { display: flex; align-items: center; margin-bottom: 12px; gap: 10px; flex-wrap: wrap; }
    .correlation-moon { width: 40px; text-align: center; font-size: 1.3rem; flex-shrink: 0; }
    .correlation-bar { flex: 1; min-width: 80px; height: 25px; background: #f0f0f0; border-radius: 12px; overflow: hidden; position: relative; }
    .correlation-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 12px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: white; font-weight: bold; font-size: 0.75rem; min-width: 35px; }
    .correlation-label { min-width: 50px; font-size: 0.75rem; text-align: right; }
    .quote-card { background: linear-gradient(135deg, #f8f9fa, #e9ecef); border-left: 4px solid #667eea; padding: 15px; margin: 10px 0; border-radius: 0 8px 8px 0; }
    .quote-text { font-size: 0.85rem; color: #333; font-style: italic; margin-bottom: 8px; line-height: 1.5; }
    .quote-source { font-size: 0.7rem; color: #666; text-align: right; }
    .mood-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; justify-content: center; }
    .mood-legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.65rem; }
    .mood-legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎱 心情投球</h1>
      <p>每天一次，记录心情与月相</p>
    </header>
    <div id="messageContainer"></div>
    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('today')">今日投球</button>
        <button class="tab-btn" onclick="switchTab('stats')">统计</button>
        <button class="tab-btn" onclick="switchTab('history')">历史</button>
        <button class="tab-btn" onclick="switchTab('correlation')">月相</button>
      </div>
      <div id="todayTab" class="tab-content active">
        <div class="moon-phase" id="moonPhase">
          <div class="moon-icon">🌙</div>
          <div class="moon-name">加载中...</div>
          <div class="moon-date" id="currentDate"></div>
        </div>
        <h2>选择今天的心情</h2>
        <div class="mood-selection">
          <div class="mood-ball red" onclick="selectMood('red', '兴奋')"><span>🔴</span><span>兴奋</span></div>
          <div class="mood-ball yellow" onclick="selectMood('yellow', '开心')"><span>🟡</span><span>开心</span></div>
          <div class="mood-ball blue" onclick="selectMood('blue', '忧郁')"><span>🔵</span><span>忧郁</span></div>
          <div class="mood-ball green" onclick="selectMood('green', '平和')"><span>🟢</span><span>平和</span></div>
          <div class="mood-ball purple" onclick="selectMood('purple', '焦虑')"><span>🟣</span><span>焦虑</span></div>
          <div class="mood-ball orange" onclick="selectMood('orange', '活力')"><span>🟠</span><span>活力</span></div>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitMood()" disabled>投球！</button>
      </div>
      <div id="statsTab" class="tab-content">
        <h2>心情统计</h2>
        <div class="stats-grid" id="statsGrid">
          <div class="stat-item"><div class="stat-count" id="totalDays">0</div><div class="stat-label">总天数</div></div>
          <div class="stat-item"><div class="stat-count" id="currentStreak">0</div><div class="stat-label">连续</div></div>
          <div class="stat-item"><div class="stat-count" id="longestStreak">0</div><div class="stat-label">最长</div></div>
          <div class="stat-item"><div class="stat-count" id="thisMonth">0</div><div class="stat-label">本月</div></div>
        </div>
      </div>
      <div id="historyTab" class="tab-content">
        <h2>投球历史</h2>
        <div class="calendar-container">
          <div class="calendar-header">
            <h3 id="calendarTitle">2026 年 3 月</h3>
            <div class="calendar-nav">
              <button onclick="prevMonth()">‹</button>
              <button onclick="nextMonth()">›</button>
            </div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div class="mood-legend" id="moodLegend"></div>
        <div class="history-list" id="historyList"></div>
      </div>
      <div id="correlationTab" class="tab-content">
        <h2>心情与月相关联</h2>
        <div class="correlation-chart" id="correlationChart"></div>
        <div id="quoteContainer"></div>
      </div>
    </div>
  </div>
<script>
const MOON_PHASES=[{name:'新月',icon:'🌑'},{name:'蛾眉月',icon:'🌒'},{name:'上弦月',icon:'🌓'},{name:'盈凸月',icon:'🌔'},{name:'满月',icon:'🌕'},{name:'亏凸月',icon:'🌖'},{name:'下弦月',icon:'🌗'},{name:'残月',icon:'🌘'}];
const MOOD_COLORS={red:{label:'兴奋',class:'red',from:'#ff6b6b',to:'#ee5a5a'},yellow:{label:'开心',class:'yellow',from:'#ffd93d',to:'#f9c846'},blue:{label:'忧郁',class:'blue',from:'#6b9eff',to:'#5a8bee'},green:{label:'平和',class:'green',from:'#6bce6b',to:'#5abf5a'},purple:{label:'焦虑',class:'purple',from:'#a78bfa',to:'#9377f0'},orange:{label:'活力',class:'orange',from:'#ff9f43',to:'#ff8e2e'}};
const MOOD_QUOTES={
  red:[{text:'愤怒是短暂的疯狂',source:'贺拉斯'}, {text:'激情是天才的燃料',source:'歌德'}, {text:'怒火中烧时，沉默是最好的回答',source:'中国谚语'}],
  yellow:[{text:'快乐是一种传染病',source:'罗曼·罗兰'}, {text:'笑是世界上最美丽的语言',source:'雨果'}, {text:'清晨，有希望',source:'哥本哈根三部曲'}],
  blue:[{text:'忧郁是灵魂的底色',source:'村上春树'}, {text:'眼泪是心中的雨',source:'泰戈尔'}, {text:'悲伤让我们更深刻',source:'尼采'}],
  green:[{text:'平静是最大的力量',source:'老子'}, {text:'心静自然凉',source:'中国谚语'}, {text:'宁静致远',source:'诸葛亮'}],
  purple:[{text:'焦虑是未来的阴影',source:'塞涅卡'}, {text:'担忧不会带走明天的悲伤，只会带走今天的力量',source:'佚名'}, {text:'恐惧是心灵的牢笼',source:'富兰克林'}],
  orange:[{text:'活力是生命的火花',source:'爱默生'}, {text:'运动是生命的源泉',source:'达·芬奇'}, {text:'年轻就是资本',source:'萧伯纳'}]
};
let selectedMood=null;let selectedMoodLabel=null;let currentCalendarDate=new Date();
document.addEventListener('DOMContentLoaded',function(){initApp()});
function initApp(){updateMoonPhase();checkTodaySubmission();loadStats();loadHistory();loadCorrelation();renderCalendar();renderMoodLegend()}
function initApp(){updateMoonPhase();checkTodaySubmission();loadStats();loadHistory();loadCorrelation();renderCalendar();renderMoodLegend()}
function updateMoonPhase(){const now=new Date();const dateStr=now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});document.getElementById('currentDate').textContent=dateStr;const moonPhase=calculateMoonPhase(now);const moonElement=document.getElementById('moonPhase');moonElement.innerHTML=`<div class="moon-icon">${moonPhase.icon}</div><div class="moon-name">${moonPhase.name}</div><div class="moon-date">${dateStr}</div>`}
function calculateMoonPhase(date){const year=date.getFullYear();const month=date.getMonth()+1;const day=date.getDate();const timezoneOffset=8;const jsDate=new Date(date.getTime()+timezoneOffset*3600*1000);const knownNewMoon=new Date('2000-01-06T18:14:00+08:00');const synodicMonth=29.53058867;const diffTime=jsDate.getTime()-knownNewMoon.getTime();const diffDays=diffTime/(1000*60*60*24);const totalCycles=diffDays/synodicMonth;const currentCycle=totalCycles-Math.floor(totalCycles);const phaseIndex=Math.floor(currentCycle*8)%8;return MOON_PHASES[phaseIndex]}
function getTodayString(){const now=new Date();const year=now.getFullYear();const month=String(now.getMonth()+1).padStart(2,'0');const day=String(now.getDate()).padStart(2,'0');return`${year}-${month}-${day}`}
function checkTodaySubmission(){const today=getTodayString();const records=getRecords();const alreadySubmitted=records.some(record=>record.date===today);if(alreadySubmitted){showMessage('今天已经投过球啦！明天再来吧～','info');document.getElementById('submitBtn').disabled=true;document.getElementById('submitBtn').textContent='今日已投球 ✓';document.querySelectorAll('.mood-ball').forEach(ball=>{ball.style.opacity='0.5';ball.style.cursor='not-allowed'})}else{document.getElementById('submitBtn').disabled=!selectedMood}}
function selectMood(mood,label){const today=getTodayString();const records=getRecords();const alreadySubmitted=records.some(record=>record.date===today);if(alreadySubmitted){return}selectedMood=mood;selectedMoodLabel=label;document.querySelectorAll('.mood-ball').forEach(ball=>{ball.classList.remove('selected')});const selectedBall=document.querySelector(`.mood-ball[data-mood="${mood}"]`);if(selectedBall){selectedBall.classList.add('selected')}document.getElementById('submitBtn').disabled=!selectedMood}
function submitMood(){if(!selectedMood||!selectedMoodLabel){showMessage('请先选择一个心情哦！','error');return}const today=getTodayString();const moonPhase=calculateMoonPhase(new Date());const newRecord={date:today,mood:selectedMood,moodLabel:selectedMoodLabel,moonPhase:moonPhase.name,moonIcon:moonPhase.icon,timestamp:new Date().getTime()};const records=getRecords();records.push(newRecord);saveRecords(records);showMessage('投球成功！记录已保存～','success');document.getElementById('submitBtn').disabled=true;document.getElementById('submitBtn').textContent='今日已投球 ✓';document.querySelectorAll('.mood-ball').forEach(ball=>{ball.style.opacity='0.5';ball.style.cursor='not-allowed'});loadStats();loadHistory();loadCorrelation();selectedMood=null;selectedMoodLabel=null;document.querySelectorAll('.mood-ball').forEach(ball=>{ball.classList.remove('selected')})}
function getRecords(){const records=localStorage.getItem('moodBallRecords');return records?JSON.parse(records):[]}
function saveRecords(records){localStorage.setItem('moodBallRecords',JSON.stringify(records))}
function loadStats(){const records=getRecords();document.getElementById('totalDays').textContent=records.length;const{current,longest}=calculateStreaks(records);document.getElementById('currentStreak').textContent=current;document.getElementById('longestStreak').textContent=longest;const now=new Date();const currentMonth=now.getMonth();const currentYear=now.getFullYear();const thisMonthCount=records.filter(record=>{const recordDate=new Date(record.date);return recordDate.getMonth()===currentMonth&&recordDate.getFullYear()===currentYear}).length;document.getElementById('thisMonth').textContent=thisMonthCount}
function calculateStreaks(records){if(records.length===0){return{current:0,longest:0}}const sortedRecords=[...records].sort((a,b)=>new Date(b.date)-new Date(a.date));let currentStreak=0;const today=new Date();today.setHours(0,0,0,0);for(let i=0;i<sortedRecords.length;i++){const recordDate=new Date(sortedRecords[i].date);recordDate.setHours(0,0,0,0);const expectedDate=new Date(today);expectedDate.setDate(expectedDate.getDate()-i);if(recordDate.getTime()===expectedDate.getTime()){currentStreak++}else{break}}let longestStreak=0;let tempStreak=1;for(let i=1;i<sortedRecords.length;i++){const currentDate=new Date(sortedRecords[i].date);const prevDate=new Date(sortedRecords[i-1].date);const diffDays=(prevDate-currentDate)/(1000*60*60*24);if(diffDays===1){tempStreak++}else{longestStreak=Math.max(longestStreak,tempStreak);tempStreak=1}}longestStreak=Math.max(longestStreak,tempStreak);return{current:currentStreak,longest:longestStreak}}
function renderMoodLegend(){const legend=document.getElementById('moodLegend');legend.innerHTML=Object.entries(MOOD_COLORS).map(([mood,info])=>`<div class="mood-legend-item"><div class="mood-legend-dot" style="background:linear-gradient(135deg,${info.from},${info.to})"></div>${info.label}</div>`).join('')}
function renderCalendar(){const records=getRecords();const grid=document.getElementById('calendarGrid');const title=document.getElementById('calendarTitle');const year=currentCalendarDate.getFullYear();const month=currentCalendarDate.getMonth();title.textContent=`${year}年${month+1}月`;const firstDay=new Date(year,month,1);const lastDay=new Date(year,month+1,0);const startWeekday=firstDay.getDay();grid.innerHTML='日一二三四五六'.split('').map(d=>`<div class="calendar-weekday">${d}</div>`).join('');for(let i=0;i<startWeekday;i++){grid.innerHTML+=`<div class="calendar-day empty"></div>`}const recordMap={};records.forEach(r=>{recordMap[r.date]=r});for(let day=1;day<=lastDay.getDate();day++){const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const record=recordMap[dateStr];const isToday=dateStr===getTodayString();const moonPhase=calculateMoonPhase(new Date(year,month,day));let content=`<div class="day-num">${day}</div><div class="moon-mini">${moonPhase.icon}</div>`;if(record){const moodInfo=MOOD_COLORS[record.mood];content+=`<div class="mood-dot" style="background:linear-gradient(135deg,${moodInfo.from},${moodInfo.to})" title="${record.moodLabel}"></div>`}grid.innerHTML+=`<div class="calendar-day ${isToday?'today':''}" data-date="${dateStr}">${content}</div>`}}
function loadHistory(){const records=getRecords();const historyList=document.getElementById('historyList');if(records.length===0){historyList.innerHTML='<p style="text-align:center;color:#999;padding:20px;font-size:0.8rem;">暂无记录</p>';return}const sortedRecords=[...records].sort((a,b)=>new Date(b.date)-new Date(a.date));historyList.innerHTML=sortedRecords.map(record=>{const moodInfo=MOOD_COLORS[record.mood];return`<div class="history-item"><div class="history-ball ${moodInfo.class}" style="background:linear-gradient(135deg,${moodInfo.from},${moodInfo.to})"></div><div class="history-info"><div class="history-date">${record.date} - ${record.moodLabel}</div><div class="history-moon">${record.moonIcon} ${record.moonPhase}</div></div></div>`}).join('')}
function prevMonth(){currentCalendarDate.setMonth(currentCalendarDate.getMonth()-1);renderCalendar()}
function nextMonth(){currentCalendarDate.setMonth(currentCalendarDate.getMonth()+1);renderCalendar()}
function loadCorrelation(){const records=getRecords();const chart=document.getElementById('correlationChart');const quoteContainer=document.getElementById('quoteContainer');if(records.length<1){chart.innerHTML='<p style="text-align:center;color:#999;padding:20px;font-size:0.8rem;">开始记录后，这里会显示心情与月相的关联</p>';quoteContainer.innerHTML='';return}const moonMoodStats={};MOON_PHASES.forEach(phase=>{moonMoodStats[phase.name]={total:0,moods:{}};Object.keys(MOOD_COLORS).forEach(mood=>{moonMoodStats[phase.name].moods[mood]=0})});records.forEach(record=>{if(moonMoodStats[record.moonPhase]){moonMoodStats[record.moonPhase].total++;if(moonMoodStats[record.moonPhase].moods[record.mood]!==undefined){moonMoodStats[record.moonPhase].moods[record.mood]++}}});const moonPhaseIcons={'新月':'🌑','蛾眉月':'🌒','上弦月':'🌓','盈凸月':'🌔','满月':'🌕','亏凸月':'🌖','下弦月':'🌗','残月':'🌘'};const hasData=Object.values(moonMoodStats).some(s=>s.total>0);if(!hasData){chart.innerHTML='<p style="text-align:center;color:#999;padding:20px;font-size:0.8rem;">数据不足，继续记录吧！</p>';quoteContainer.innerHTML='';return}chart.innerHTML=Object.entries(moonMoodStats).filter(([_,data])=>data.total>0).map(([phaseName,data])=>{const moodInfo=MOOD_COLORS[data.mood];return`<div class="correlation-item"><div class="correlation-moon">${moonPhaseIcons[phaseName]}</div><div class="correlation-bar"><div class="correlation-fill" style="width:${Math.max(35,data.percentage)}%">${data.percentage}%</div></div><div class="correlation-label">${moodInfo.label}</div></div>`}).join('');const todayRecord=records.find(r=>r.date===getTodayString());if(todayRecord){const quotes=MOOD_QUOTES[todayRecord.mood]||[];const quote=quotes[Math.floor(Math.random()*quotes.length)];if(quote){quoteContainer.innerHTML=`<div class="quote-card"><div class="quote-text">"${quote.text}"</div><div class="quote-source">—— ${quote.source}</div></div>`}}else{quoteContainer.innerHTML=''}}
function switchTab(tabName){document.querySelectorAll('.tab-btn').forEach(btn=>{btn.classList.remove('active')});event.target.classList.add('active');document.querySelectorAll('.tab-content').forEach(content=>{content.classList.remove('active')});document.getElementById(`${tabName}Tab`).classList.add('active');if(tabName==='stats'){loadStats()}else if(tabName==='history'){loadHistory();renderCalendar()}else if(tabName==='correlation'){loadCorrelation()}}
function showMessage(text,type){const container=document.getElementById('messageContainer');container.innerHTML=`<div class="message ${type}">${text}</div>`;setTimeout(()=>{container.innerHTML=''},3000)}
</script>
</body>
</html>
